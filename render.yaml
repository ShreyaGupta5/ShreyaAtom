services:
  # ----------------------------------------------------
  # 1. Express Backend Web Service
  # ----------------------------------------------------
  - type: web
    name: shreya-atom-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: node index.js
    envVars:
      - key: PORT
        value: 5001
      - key: DATABASE_URL
        value: file:./dev.db
      - key: NODE_ENV
        value: production

  # ----------------------------------------------------
  # 2. Vite Frontend Static Site
  # ----------------------------------------------------
  - type: static
    name: shreya-atom-frontend
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        value: https://shreya-atom-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
